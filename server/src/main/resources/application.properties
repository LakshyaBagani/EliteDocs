# Application
spring.application.name=DocConsult
spring.config.import=optional:classpath:application-secret.properties

# Server
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:6543/postgres?prepareThreshold=0
spring.datasource.username=postgres.qoathumnoyjabfvrjvpl
spring.datasource.password=Lakshya31032006
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# JWT Configuration
app.jwt.secret=DocConsultSecretKeyForJWTTokenGenerationMustBe256BitsLongForHS256Algorithm2024
app.jwt.expiration=86400000
