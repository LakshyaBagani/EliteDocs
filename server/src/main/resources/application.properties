# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.file.upload-dir=./uploads

# Email Configuration (Mailtrap - switch to Gmail later)
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=587
spring.mail.username=lakshyabagani123@gmail.com
spring.mail.password=your_mailtrap_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Swagger/OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Rate Limiting
app.rate-limit.requests-per-minute=60

# Admin Credentials
app.admin.email=admin@elitedocs.com
app.admin.password=Admin@123456

# Brevo Email API
# Brevo Email API - key loaded from application-secret.properties

# CORS
app.cors.allowed-origins=http://localhost:5173

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=10
